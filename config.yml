services:
  - name: "catalog"
    path: "/catalog"
    origin_url: "http://0.0.0.0:3001"
    methods: ["GET", "POST"]
    plugins:
      - name: http_log
      - name: add_header
        config:
          headers:
            X-Gateway: "dealer"
            X-Gateway-Service: "catalog"
      - name: request_size_limiting
        config:
          max_bytes: 1048576
      - name: rate_limiting
        config:
          requests_per_second: 5
          burst: 10

  - name: "payments"
    path: "/payments"
    origin_url: "http://0.0.0.0:3002"
    methods: ["POST"]
    plugins:
      - name: http_log
      - name: jwt_auth
        config:
          secret_env: JWT_SECRET
      - name: request_size_limiting
        config:
          max_bytes: 65536

  - name: "orders"
    path: "/orders/{id}"
    origin_url: "http://0.0.0.0:3003"
    methods: ["GET", "PUT"]
    plugins:
      - name: http_log
      - name: jwt_auth
        config:
          secret_env: JWT_SECRET
