name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.25.11"

jobs:
  test:
    name: Build, vet & test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [cmd/dealer, config, gateway]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test ./... -race

  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [cmd/dealer, config, gateway]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
